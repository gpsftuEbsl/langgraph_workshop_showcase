<!DOCTYPE html>
<html>

<head>

</head>

<style>
    body {
        font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 75vh;
        margin: 0;
        background-color: #f4f7f6;
        color: #333;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        color: #2c3e50;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }

    .btn-container {
        display: flex;
        gap: 150px;
    }

    button {
        padding: 12px 30px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 50px;
        /* 圓角造型 */
        transition: all 0.3s ease;
        /* 平滑轉換動畫 */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    #btn1 {
        background-color: rgb(75, 163, 119)
    }

    #btn2 {
        background-color: rgb(82, 119, 171)
    }

    button:hover {
        color: #f1c40f;
        /* 鼠標在上面時，文字變成黃色 */
        cursor: pointer;
        /* 確保鼠標會變成「小手」形狀 */
    }
</style>

<body>
    <h1 id="title">標題</h1>

    <div class="btn-container">
        <button id="btn1">按鈕1</button>
        <button id="btn2">按鈕2</button>
    </div>
    <script>
        // 1. 取得網址列中的參數字串 (例如 ?text=Hello&b1=點我&b2=取消)
        const urlParams = new URLSearchParams(window.location.search);

        // 2. 擷取特定的參數值
        const titleText = urlParams.get('text'); // 取得 text 參數
        const btn1Text = urlParams.get('b1');    // 取得 b1 參數
        const btn2Text = urlParams.get('b2');    // 取得 b2 參數

        // 3. 如果參數存在，則更新 HTML 元素的內容
        if (titleText) {
            document.getElementById('title').innerText = titleText;
        }

        if (btn1Text) {
            document.getElementById('btn1').innerText = btn1Text;
        }

        if (btn2Text) {
            document.getElementById('btn2').innerText = btn2Text;
        }

        // 1. 選取按鈕元素
        const button1 = document.getElementById('btn1');
        const button2 = document.getElementById('btn2');

        // 2. 為第一個按鈕加入點擊事件
        button1.addEventListener('click', function () {
            alert('你選了: ' + button1.innerText);
        });

        // 3. 為第二個按鈕加入點擊事件
        button2.addEventListener('click', function () {
            alert('你選了: ' + button2.innerText);
        });
    </script>
</body>

</html>
